# Docubot project configuration
# See https://github.com/dpletta/docubot

schema_version: 1

watch_paths:
  - "src/**"
  - "lib/**"
  - "notebooks/**"
  - "data/**"
  - "metadata/**"
  - "*.py"
  - "*.ipynb"
  - "pyproject.toml"

docs:
  changelog: CHANGELOG.md
  architecture: docs/ARCHITECTURE.md
  readme: README.md
  dms_plan: docs/DATA_MANAGEMENT_AND_SHARING.md
  fair_checklist: docs/FAIR_CHECKLIST.md

metadata:
  project_file: .docubot/metadata/project.yaml
  datacite_output: metadata/datacite.json
  citation_cff: CITATION.cff

compliance:
  fair: true
  nih_dms: true
  strict: false

components:
  - name: core
    paths:
      - "src/docubot/**"
  - name: hooks
    paths:
      - ".cursor/hooks/**"
      - ".githooks/**"
  - name: docs
    paths:
      - "docs/**"
      - "templates/**"
      - "*.md"
  - name: data
    paths:
      - "data/**"
      - "notebooks/**"
      - "metadata/**"

stale_check: warn  # warn | strict | off

llm:
  enabled: false
  model: gpt-4o-mini
  max_tokens: 512

preserve_sections: true
